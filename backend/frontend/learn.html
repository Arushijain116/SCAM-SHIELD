    <h1 class="help-title">📚 Learn About Scams</h1>

    <div class="help-section">

      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="help-img">
      <ul>
        <li><b>Phishing:</b> Fake login pages</li>
        <li><b>Lottery scams:</b> Fake rewards</li>
