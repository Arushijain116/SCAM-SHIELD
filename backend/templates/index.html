<!DOCTYPE html>
<html>
<head>
  <title>Scam Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <h2>Scam Detector</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <textarea id="inputText" placeholder="Paste message here..."></textarea>
  <button onclick="scan()">Scan</button>

  <div id="loading">Scanning...</div>

  <div id="result"></div>

  <h3>📊 Stats</h3>
  <div id="stats"></div>

  <h3>🚨 Alerts</h3>
  <div id="alerts"></div>

  <h3>🔔 Notifications</h3>
  <div id="notifications"></div>
</div>

<script src="script.js"></script>
</body>
</html>
