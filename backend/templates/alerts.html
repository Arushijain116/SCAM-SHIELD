<!DOCTYPE html>
<html>
<head>
    <title>Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-black min-h-screen text-white">

<nav class="bg-gradient-to-r from-blue-900 to-red-700 p-5 flex justify-between">

    <h1 class="text-3xl font-bold">
        🚨 Scam Alerts
    </h1>

    <div class="space-x-6">
        <a href="/dashboard">Dashboard</a>
        <a href="/scan">Scan</a>
        <a href="/reports">Reports</a>
        <a href="/learn">Learn</a>
        <a href="/alerts" class="text-yellow-300">Alerts</a>
    </div>

</nav>

<div class="max-w-6xl mx-auto p-10">

    <div class="space-y-8">

        {% for scam in trending_scams %}

        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl">

            <div class="flex justify-between mb-4">

                <h2 class="text-2xl font-bold">
                    {{ scam.name }}
                </h2>

                <span class="text-red-400 text-xl font-bold">
                    {{ scam.risk }}%
                </span>

            </div>

            <div class="w-full bg-gray-700 rounded-full h-5">

                <div
                    class="bg-gradient-to-r from-red-500 to-pink-500 h-5 rounded-full"
                    style="width: {{ scam.risk }}%">
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
