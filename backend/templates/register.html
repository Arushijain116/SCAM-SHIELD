<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-purple-950 min-h-screen flex items-center justify-center">

<div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl w-[400px] shadow-2xl">

    <h1 class="text-4xl font-bold text-white text-center mb-8">
        Register ✨
    </h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="w-full p-4 rounded-xl bg-black/30 text-white mb-4"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="w-full p-4 rounded-xl bg-black/30 text-white mb-6"
            required
        >

        <button
            type="submit"
            class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-xl"
        >
            Register 🔥
        </button>

    </form>

</div>

</body>
</html>
